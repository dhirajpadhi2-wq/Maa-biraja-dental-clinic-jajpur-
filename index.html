<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maa Biraja Dental Clinic</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#f4f9ff;color:#333}

/* NAVBAR */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:white;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
position:fixed;
width:100%;
z-index:1000;
}
nav img{height:45px}
nav a{
text-decoration:none;
margin-left:20px;
color:#0f9bff;
font-weight:500;
}

/* HERO */
.hero{
height:100vh;
background:linear-gradient(135deg,#0f9bff,#00c6ff);
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
padding:20px;
}
.hero h1{font-size:40px}
.hero p{margin:15px 0}

.btn{
padding:12px 25px;
margin:5px;
border:none;
border-radius:30px;
cursor:pointer;
font-weight:500;
transition:0.3s;
text-decoration:none;
display:inline-block;
}
.call{background:white;color:#0f9bff}
.whatsapp{background:#25D366;color:white}
.appoint{background:#ff9800;color:white}
.btn:hover{transform:scale(1.1)}

section{padding:80px 20px;text-align:center}

.service-box{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;
margin-top:30px;
}
.card{
background:#0f9bff;
color:white;
padding:25px;
border-radius:15px;
width:200px;
transition:0.3s;
}
.card:hover{transform:translateY(-10px);background:#007acc}

/* Contact Form */
.contact-form{
max-width:400px;
margin:auto;
display:flex;
flex-direction:column;
gap:10px;
}
.contact-form input,
.contact-form textarea{
padding:10px;
border:1px solid #ccc;
border-radius:5px;
}
.contact-form button{
background:#0f9bff;
color:white;
padding:10px;
border:none;
border-radius:5px;
cursor:pointer;
}

/* Floating */
.floating-call{
position:fixed;
bottom:20px;
right:20px;
background:#ff5722;
color:white;
padding:15px;
border-radius:50%;
font-size:20px;
text-decoration:none;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

footer{
background:#0f9bff;
color:white;
padding:20px;
text-align:center;
}
</style>
</head>
<body>

<nav>
<img src="https://i.imgur.com/7bKQ8KX.png" alt="Clinic Logo">
<div>
<a href="#services">Services</a>
<a href="#contact">Contact</a>
</div>
</nav>

<header class="hero">
<div>
<h1>Maa Biraja Dental Clinic</h1>
<p>Your Smile, Our Priority 🦷</p>

<a href="tel:+919090390085" class="btn call">📞 Call Now</a>

<!-- WhatsApp Auto Message -->
<a href="https://wa.me/919090390085?text=Hello%20I%20want%20to%20book%20an%20appointment%20at%20Maa%20Biraja%20Dental%20Clinic"
target="_blank" class="btn whatsapp">💬 WhatsApp Booking</a>

<a href="#contact" class="btn appoint">📅 Book Appointment</a>
</div>
</header>

<section id="services" data-aos="fade-up">
<h2>Our Services</h2>
<div class="service-box">
<div class="card">🦷 Teeth Cleaning</div>
<div class="card">😁 Root Canal</div>
<div class="card">✨ Smile Designing</div>
<div class="card">😬 Braces & Aligners</div>
</div>
</section>

<section id="contact" data-aos="fade-up">
<h2>Book Appointment</h2>

<!-- EMAIL INTEGRATION USING FORMSUBMIT -->
<form class="contact-form"
action="https://formsubmit.co/YOUR-EMAIL@gmail.com"
method="POST">

<input type="text" name="name" placeholder="Your Name" required>
<input type="tel" name="phone" placeholder="Phone Number" required>
<textarea name="message" placeholder="Your Message"></textarea>

<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_next" value="https://yourusername.github.io/">

<button type="submit">Submit Appointment</button>
</form>

</section>

<footer>
© 2026 Maa Biraja Dental Clinic | Jajpur, Odisha
</footer>

<a href="tel:+919090390085" class="floating-call">📞</a>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init();
</script>

</body>
</html>
